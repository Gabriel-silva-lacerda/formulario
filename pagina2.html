<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/cadastro.css">
    <link rel="stylesheet" type="text/css" href="fontawesome-free-6.2.1-web/css/all.min.css">
    <link rel="shortcut icon" href="imagens/login-2.png" type="image/x-icon">
    <title>Crie sua conta</title>
</head>
<body>
    <section>
        <img src="imagens/login-2.png" alt="">
        <h1>Create account!</h1>

        <form>
            <div class="container-name">
                    <label for="name">Name</label>
                    <input type="text" id="nome" placeholder="enter your name" required>
                    <span class="icone"><i class="fa-solid fa-user"></i></span>
            </div>
            
            <div class="container-email">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="enter your e-mail" required>
                    <span class="icone"><i class="fa-solid fa-envelope"></i></span>
            </div>
            
        
            <div class="container-passoword">
                    <label for="password">Password</label>
                    <input type="password" id="senha" placeholder="enter a name" required>
                    <span class="icone"><i class="fa-solid fa-eye"></i></span>
            </div>
            
            <button>Creat</button>
        </form>

        <p>Or create account usin social medial</p>
        
        <div class="container">
            <img src="imagens/icone-facebook.png" alt="Icone-facebook">
            <img src="imagens/icone-twitter.png" alt="Icone-twitter">
        </div>

        <a href="index.html"><img id="voltar" src="imagens/icone-voltar.png" alt="Icone-voltar"></a>
    </section>
</body>
</html>
