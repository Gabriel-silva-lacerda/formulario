<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" type="text/css" href="fontawesome-free-6.2.1-web/css/all.min.css">
    <link rel="shortcut icon" href="imagens/login-icon-2-256.png" type="image/x-icon">
    <title>Formulario</title>
</head>
<body>
    <section>
        <img src="imagens/login-icon-2-256.png" alt="">
        <h1>Welcome!</h1>
        <p> Sing in to your account</p>
        <form>
            
            <div class="container-name">
                <label for="name">Name</label>
                <input type="text" id="nome" placeholder="enter your name" required>
                <span class="icone"><i class="fa-solid fa-user"></i></span>
            </div>
            
            <div class="container-passoword">
                <label for="password">Password</label>
                <input type="password" id="senha" placeholder="enter passord" required>
                <span class="icone"><i class="fa-solid fa-eye"></i></span>
            </div>
            
            <div class="container">
                <span>
                    <input type="checkbox" id="checkbox">
                    <label id="checkbox" for="lembrar-senha">remember me?</label>
                </span>
                <a href="#">forgot password</a>
            </div>
                <button>Sing in</button>
               <p>Don't have a account? <a href="pagina2.html " target="_blank">Sing up</a></p>
        </form>
    </section>
</body>
</html>
